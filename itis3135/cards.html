<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laki14's Lazy Leopard ~ ITIS 3135 | Playing Cards</title>

    <link rel="stylesheet" href="styles/default.css">
    <link rel="stylesheet" href="styles/cards.css">

    <script src="https://lint.page/kit/4d0fe3.js" crossorigin="anonymous"></script>
</head>
<body>
    <div data-include="components/header.html"></div>

    <main id="playing-cards">
        <div class="card spade-card">
            <div class="left">A ♠</div>
            <div class="middle">
                <span>♠</span>
                <span>♠</span>
            </div>
            <div class="right">A ♠</div>
        </div>

        <div class="card heart-card">
            <div class="left">K ♥</div>
            <div class="middle">
                <span>♥</span>
                <span>♥</span>
            </div>
            <div class="right">K ♥</div>
        </div>

        <div class="card diamond-card">
            <div class="left">Q ♦</div>
            <div class="middle">
                <span>♦</span>
                <span>♦</span>
            </div>
            <div class="right">Q ♦</div>
        </div>
    </main>

    <div data-include="components/footer.html"></div>

    <script src="scripts/HTMLInclude.min.js"></script>
</body>
</html>
